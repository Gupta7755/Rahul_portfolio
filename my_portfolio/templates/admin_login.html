{% load static %}
<!DOCTYPE html>
<html>
  <head>
    <title>Admin Login</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }
      
      body {
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        color: white;
      }
      
      /* glass login container */
      
      .login-box {
        width: 350px;
        padding: 40px;
      
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
      
        border-radius: 12px;
      
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      }
      
      /* title */
      
      .login-box h2 {
        text-align: center;
        color: #00ffff;
        margin-bottom: 30px;
      }
      
      /* inputs */
      
      .login-box input {
        width: 100%;
        padding: 12px;
        margin-bottom: 15px;
      
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.2);
      
        color: white;
      
        border-radius: 6px;
        outline: none;
      }
      
      /* login button */
      
      .login-box button {
        width: 100%;
        padding: 12px;
      
        border: none;
        border-radius: 6px;
      
        background: #00ffff;
      
        cursor: pointer;
      
        font-weight: bold;
        transition: 0.3s;
      }
      
      .login-box button:hover {
        background: yellow;
      }
      
      /* subtle glow */
      
      .login-box:hover {
        box-shadow: 0 0 25px rgba(0, 255, 255, 0.4);
      }
    </style>
  </head>

  <body>
    <div class="login-box">
      <h2>Admin Login</h2>

      <form method="POST">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Username" />

        <input type="password" name="password" placeholder="Password" />

        <button type="submit">Login</button>
      </form>
    </div>
  </body>
</html>
